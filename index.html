<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        /* CSS 部分：控制网页的样子 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .avatar {
            width: 100px;
            height: 100px;
            background-color: #ddd;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        h1 { margin-bottom: 10px; font-size: 24px; }
        p { color: #666; line-height: 1.6; }
        .links { margin-top: 30px; }
        .btn {
            display: block;
            background: #007bff;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            margin: 10px 0;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover { background: #0056b3; }
        .footer { margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>

    <div class="card">
        <div class="avatar">🤖</div>
        <h1>你好，我是xxx</h1>
        <p>
            欢迎来到我的个人主页！<br>
            我热爱技术、编程和探索新事物。
        </p>
        
        <div class="links">
            <a href="#" class="btn">我的博客</a>
            <a href="https://github.com/你的GitHub用户名" class="btn">我的 GitHub</a>
            <a href="mailto:你的邮箱@example.com" class="btn">联系我</a>
        </div>

        <div class="footer">
            &copy; 2025 Powered by GitHub Pages
        </div>
    </div>

</body>
</html>
